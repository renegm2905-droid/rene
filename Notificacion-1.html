<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificaciones</title>
    <link rel="stylesheet" href="principal.css">
</head>
<body>

    <div class="contenedor">

        <!-- Barra superior -->
        <header class="top-bar">
            <img src="logo.png" alt="Logo" class="logo">
            <img src="perfil.png" alt="Perfil" class="perfil">
        </header>

        <!-- Título -->
        <section class="titulo">
            <button class="volver">&#8592;</button>
            <h1>Notificaciones</h1>
        </section>

        <!-- Filtros -->
        <section class="filtros">
            <button class="activo">Todos</button>
            <button>Importantes</button>
        </section>

        <!-- Lista de notificaciones -->
        <main class="lista-notificaciones">

            <article class="notificacion">
                <img src="gta6.jpg" alt="GTA VI">
                <div class="contenido">
                    <h3>Nuevo trailer de GTA VI</h3>
                    <p>Ya disponible segundo trailer</p>
                    <span>Hace 5 minutos</span>
                </div>
                <div class="indicador"></div>
            </article>

            <article class="notificacion">
                <img src="reviews.jpg" alt="Reviews">
                <div class="contenido">
                    <h3>Reviews publicada</h3>
                    <p>Ya puede leer nuestras reviews de Elden Ring</p>
                    <span>Hace 1 hora</span>
                </div>
                <div class="indicador"></div>
            </article>

            <article class="notificacion">
                <img src="evento.jpg" alt="Evento">
                <div class="contenido">
                    <h3>Evento en vivo</h3>
                    <p>Comienza el torneo de Fortnite en 20 minutos</p>
                    <span>Hace 2 horas</span>
                </div>
                <div class="indicador"></div>
            </article>

        </main>

        <!-- Barra inferior -->
        <nav class="menu">
            <button></button>
            <button></button>

            <button class="btn-centro">+</button>

            <button></button>
            <button></button>
        </nav>

    </div>

</body>
</html>
