<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-News | Chats y Comunidad</title>
    <link rel="stylesheet" href="principal.css" href="ChatsComunicacion-1.css">
</head>

<body>

    <header class="top-bar">
        <button class="back-btn"></button>
        <h1>Chats</h1>
    </header>

    <main class="chat-container">

        <div class="search-container">
            <input type="text" placeholder="Buscar chats">
        </div>

        <section class="chat-list">

            <article class="chat-card">
                <img src="img/chat-global.png" alt="Chat Global">
                <div class="chat-info">
                    <h2>Chat Global</h2>
                    <p>Bienvenidos al chat global</p>
                </div>

                <div class="chat-meta">
                    <span>09:40</span>
                    <span class="badge">12</span>
                </div>
            </article>

            <article class="chat-card">
                <img src="img/fortnite.png" alt="Fortnite">
                <div class="chat-info">
                    <h2>Fortnite</h2>
                    <p>¿Alguien para jugar dúo?</p>
                </div>

                <div class="chat-meta">
                    <span>09:32</span>
                    <span class="badge">5</span>
                </div>
            </article>

            <article class="chat-card">
                <img src="img/cod.png" alt="Call of Duty">
                <div class="chat-info">
                    <h2>Call of Duty</h2>
                    <p>Nueva actualización disponible.</p>
                </div>

                <div class="chat-meta">
                    <span>09:15</span>
                </div>
            </article>

        </section>

    </main>

    <nav class="bottom-nav">
        <button></button>
        <button></button>
        <button class="add-btn">+</button>
        <button></button>
        <button></button>
    </nav>

</body>
</html>
